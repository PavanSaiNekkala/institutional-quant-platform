name: Full Institutional Pipeline

on:

  workflow_dispatch:

  schedule:

    # =====================================================
    # MARKET HOURS (IST)
    # =====================================================

    - cron: '45 3 * * 1-5'    # 09:15 IST
    - cron: '45 4 * * 1-5'    # 10:15 IST
    - cron: '45 5 * * 1-5'    # 11:15 IST
    - cron: '45 6 * * 1-5'    # 12:15 IST
    - cron: '45 7 * * 1-5'    # 13:15 IST
    - cron: '45 8 * * 1-5'    # 14:15 IST
    - cron: '45 9 * * 1-5'    # 15:15 IST

    # =====================================================
    # AFTER MARKET
    # =====================================================

    - cron: '30 15 * * 1-5'   # 21:00 IST

permissions:
  contents: write

concurrency:
  group: institutional-pipeline
  cancel-in-progress: false

jobs:

  institutional-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ===================================================
      # VERIFY DAILY UNIVERSE FILES EXIST
      # ===================================================

      - name: Verify Universe Files
        run: |

          test -f data/processed/cross_sectional_rankings.csv
          test -f data/processed/relative_strength_rankings.csv
          test -f data/processed/sector_relative_strength.csv
          test -f data/processed/sector_summary.csv

      # ===================================================
      # RUN INSTITUTIONAL ENGINE
      # ===================================================

      - name: Run Full Institutional Pipeline
        run: |
          python run_full_pipeline.py

      # ===================================================
      # SAVE ARTIFACTS
      # ===================================================

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: institutional-results
          path: |
            data/**/*.csv
            data/**/*.xlsx
            data/**/*.parquet
          if-no-files-found: ignore

      # ===================================================
      # COMMIT RESULTS
      # ===================================================

      - name: Commit Results
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Automated Institutional Pipeline Update"

          git pull --rebase origin main || true

          git push origin HEAD:main
