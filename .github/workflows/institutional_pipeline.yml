name: Institutional Quant Pipeline

on:

  schedule:

    # Runs at:
    # 08:00 AM IST
    # 02:00 PM IST
    # 08:00 PM IST
    # 02:00 AM IST

    # UTC Conversion:
    # IST = UTC + 5:30

    - cron: '30 2,8,14,20 * * *'

  workflow_dispatch:

# =====================================================
# PREVENT OVERLAPPING RUNS
# =====================================================

concurrency:

  group: institutional-quant-pipeline

  cancel-in-progress: false

jobs:

  institutional-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 120

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================

      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

      # =====================================================
      # PYTHON
      # =====================================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install pandas numpy yfinance scipy scikit-learn

          pip install streamlit plotly openpyxl

      # =====================================================
      # CLEAN OLD GENERATED DATA
      # =====================================================

      - name: Remove Old Generated Files

        run: |

          echo "Cleaning old generated data..."

          rm -rf data/*.csv || true
          rm -rf data/*.xlsx || true
          rm -rf data/*.json || true
          rm -rf data/*.parquet || true

      # =====================================================
      # CREATE DATA DIRECTORY
      # =====================================================

      - name: Ensure Data Directory Exists

        run: |

          mkdir -p data

      # =====================================================
      # RUN FULL PIPELINE
      # =====================================================

      - name: Run Institutional AI Pipeline

        run: |

          python run_full_pipeline.py

      # =====================================================
      # VERIFY OUTPUTS
      # =====================================================

      - name: Verify Outputs

        run: |

          echo "Generated files:"

          ls -lah data/

      # =====================================================
      # GIT STATUS
      # =====================================================

      - name: Check Git Status

        run: |

          git status

      # =====================================================
      # COMMIT UPDATED DATA
      # =====================================================

      - name: Commit Updated Data

        run: |

          git config --global user.name "github-actions"

          git config --global user.email "actions@github.com"

          git add data/

          git commit -m "Automated Institutional Pipeline Update" || echo "No changes to commit"

      # =====================================================
      # PULL BEFORE PUSH
      # =====================================================

      - name: Pull Latest Changes

        run: |

          git pull --rebase origin main

      # =====================================================
      # PUSH
      # =====================================================

      - name: Push Changes

        run: |

          git push origin main

      # =====================================================
      # SUCCESS
      # =====================================================

      - name: Pipeline Complete

        run: |

          echo "Institutional AI Quant Pipeline Completed Successfully"
