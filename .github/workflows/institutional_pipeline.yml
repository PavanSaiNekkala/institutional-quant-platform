name: Institutional Quant Pipeline

on:

  schedule:

    # =====================================================
    # Runs Every 6 Hours Starting From 08:00 AM IST
    #
    # IST = UTC + 5:30
    #
    # 08:00 AM IST = 02:30 UTC
    # 02:00 PM IST = 08:30 UTC
    # 08:00 PM IST = 14:30 UTC
    # 02:00 AM IST = 20:30 UTC
    # =====================================================

    - cron: '30 2,8,14,20 * * *'

  workflow_dispatch:

# =====================================================
# PREVENT OVERLAPPING RUNS
# =====================================================

concurrency:

  group: institutional-quant-pipeline

  cancel-in-progress: false

jobs:

  institutional-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 120

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================

      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

      # =====================================================
      # PYTHON
      # =====================================================

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      # =====================================================
      # ENSURE DATA DIRECTORY
      # =====================================================

      - name: Ensure Data Directory Exists

        run: |

          mkdir -p data

      # =====================================================
      # VERIFY CRITICAL INPUT FILES
      # =====================================================

      - name: Verify Required Input Files

        run: |

          echo "Checking critical dependency files..."

          test -f data/valid_stocks.xlsx || (echo "Missing valid_stocks.xlsx" && exit 1)

      # =====================================================
      # RUN FULL PIPELINE
      # =====================================================

      - name: Run Institutional AI Pipeline

        run: |

          python run_full_pipeline.py

      # =====================================================
      # VERIFY OUTPUTS
      # =====================================================

      - name: Verify Outputs

        run: |

          echo "Generated files:"

          ls -lah data/

      # =====================================================
      # GIT STATUS
      # =====================================================

      - name: Check Git Status

        run: |

          git status

      # =====================================================
      # COMMIT UPDATED FILES
      # =====================================================

      - name: Commit Updated Data

        run: |

          git config --global user.name "github-actions"

          git config --global user.email "actions@github.com"

          git add data/

          git diff --cached --quiet || git commit -m "Automated Institutional Pipeline Update"

      # =====================================================
      # PULL LATEST CHANGES
      # =====================================================

      - name: Pull Latest Changes

        run: |

          git pull --rebase origin main

      # =====================================================
      # PUSH
      # =====================================================

      - name: Push Changes

        run: |

          git push origin main

      # =====================================================
      # SUCCESS
      # =====================================================

      - name: Pipeline Complete

        run: |

          echo "Institutional AI Quant Pipeline Completed Successfully"
