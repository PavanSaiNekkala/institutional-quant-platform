name: Institutional Quant Pipeline

on:

  schedule:

    # =====================================================
    # RUN EVERY 6 HOURS STARTING 08:00 AM IST
    #
    # IST = UTC + 5:30
    #
    # 08:00 AM IST → 02:30 UTC
    # 02:00 PM IST → 08:30 UTC
    # 08:00 PM IST → 14:30 UTC
    # 02:00 AM IST → 20:30 UTC
    # =====================================================

    - cron: '30 2,8,14,20 * * *'

  workflow_dispatch:

# =========================================================
# PREVENT OVERLAPPING RUNS
# =========================================================

concurrency:

  group: institutional-quant-pipeline

  cancel-in-progress: false

jobs:

  institutional-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 120

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================

      - name: 📥 Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0

      # =====================================================
      # PYTHON
      # =====================================================

      - name: 🐍 Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      # =====================================================
      # CACHE PIP
      # =====================================================

      - name: ⚡ Cache Pip Dependencies

        uses: actions/cache@v4

        with:

          path: ~/.cache/pip

          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

          restore-keys: |
            ${{ runner.os }}-pip-

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: 📦 Install Dependencies

        run: |

          echo "=================================================="
          echo "Installing Python Dependencies"
          echo "=================================================="

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      # =====================================================
      # ENSURE DATA DIRECTORY
      # =====================================================

      - name: 📁 Ensure Data Directory Exists

        run: |

          echo "=================================================="
          echo "Ensuring Data Directory"
          echo "=================================================="

          mkdir -p data

      # =====================================================
      # VERIFY INPUT FILES
      # =====================================================

      - name: 🔎 Verify Required Input Files

        run: |

          echo "=================================================="
          echo "Checking Critical Input Files"
          echo "=================================================="

          REQUIRED_FILES=(
            "data/valid_stocks.xlsx"
          )

          for file in "${REQUIRED_FILES[@]}"
          do
            if [ ! -f "$file" ]; then

              echo ""
              echo "❌ Missing Required File: $file"
              echo ""

              exit 1

            else

              echo "✅ Found: $file"

            fi
          done

      # =====================================================
      # SHOW INITIAL DATA
      # =====================================================

      - name: 📊 Show Existing Data Files

        run: |

          echo "=================================================="
          echo "Existing Data Files"
          echo "=================================================="

          ls -lah data/ || true

      # =====================================================
      # RUN PIPELINE
      # =====================================================

      - name: 🚀 Run Institutional AI Pipeline

        run: |

          echo "=================================================="
          echo "Starting Institutional Quant Pipeline"
          echo "=================================================="

          python run_full_pipeline.py

      # =====================================================
      # VERIFY OUTPUTS
      # =====================================================

      - name: ✅ Verify Outputs

        run: |

          echo "=================================================="
          echo "Generated Output Files"
          echo "=================================================="

          ls -lah data/

      # =====================================================
      # GIT STATUS
      # =====================================================

      - name: 📌 Check Git Status

        run: |

          echo "=================================================="
          echo "Git Status"
          echo "=================================================="

          git status

      # =====================================================
      # COMMIT CHANGES
      # =====================================================

      - name: 💾 Commit Updated Data

        run: |

          echo "=================================================="
          echo "Committing Updated Files"
          echo "=================================================="

          git config --global user.name "github-actions"

          git config --global user.email "actions@github.com"

          git add data/

          git diff --cached --quiet || git commit -m "Automated Institutional Pipeline Update"

      # =====================================================
      # PULL LATEST
      # =====================================================

      - name: 🔄 Pull Latest Changes

        run: |

          echo "=================================================="
          echo "Pulling Latest Repository Changes"
          echo "=================================================="

          git pull --rebase origin main

      # =====================================================
      # PUSH
      # =====================================================

      - name: 🚀 Push Changes

        run: |

          echo "=================================================="
          echo "Pushing Changes To Repository"
          echo "=================================================="

          git push origin main

      # =====================================================
      # SUCCESS
      # =====================================================

      - name: 🏆 Pipeline Complete

        run: |

          echo ""
          echo "=================================================="
          echo "🏦 INSTITUTIONAL QUANT PIPELINE COMPLETE"
          echo "=================================================="
          echo ""

          echo "✅ Workflow Executed Successfully"

          echo ""
