name: Intraday Quant Pipeline

on:

  workflow_dispatch:

  schedule:
    - cron: '0 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '0 10 * * 1-5'

jobs:

  intraday:

    runs-on: ubuntu-latest

    timeout-minutes: 120

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Intraday Pipeline
        run: |
          python analytics/regime_engine.py
          python analytics/factor_model.py
          python analytics/expected_return_engine.py
          python analytics/entry_quality_engine.py
          python analytics/conviction_engine.py
          python analytics/portfolio_monitor.py
          python analytics/signal_database.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: intraday-results
          path: data/

      - name: Commit Results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/

          git diff --cached --quiet || \
          git commit -m "Automated Intraday Update"

          git push
