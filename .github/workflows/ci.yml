name: Institutional Quant CI/CD

on:

  push:

    branches:

      - main

  pull_request:

    branches:

      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

    # =====================================================
    # CHECKOUT
    # =====================================================

    - name: Checkout Repository

      uses: actions/checkout@v4

    # =====================================================
    # PYTHON
    # =====================================================

    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.11"

    # =====================================================
    # INSTALL
    # =====================================================

    - name: Install Dependencies

      run: |

        python -m pip install --upgrade pip

        pip install -r requirements.txt

    # =====================================================
    # BASIC TEST
    # =====================================================

    - name: Verify Core Imports

      run: |

        python -c "import pandas"

        python -c "import numpy"

        python -c "import streamlit"

        python -c "import plotly"

        python -c "import sklearn"

    # =====================================================
    # DOCKER BUILD
    # =====================================================

    - name: Build Docker Image

      run: |

        docker build -t institutional-quant .
    # =====================================================
    # INTEGRATION TESTS
    # =====================================================

    - name: Run Integration Tests

      run: |

        python tests/integration_test.py

    # =====================================================
    # RELEASE VALIDATION
    # =====================================================

    - name: Run Release Validation

      run: |

        python app/test_release_validator.py

    # =====================================================
    # PRODUCTION CHECKLIST
    # =====================================================

    - name: Run Production Checklist

      run: |

        python app/test_production_checklist.py
